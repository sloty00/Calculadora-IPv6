<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subneteador IPv6 Profesional</title>
    <link rel="stylesheet" href="./static/css/style.css">
</head>
<body>
    <div class="container">
        <h1>Calculadora IPv6</h1>
        <div class="form-group">
            <input type="text" id="base_ipv6" placeholder="Ej: 2001:db8::/48">
            <input type="number" id="prefix" placeholder="Nuevo prefijo (ej: 64)">
            <button onclick="calcular()">Subnetear</button>
        </div>
        <table id="resultTable">
            <thead>
                <tr>
                    <th>Red</th>
                    <th>Gateway</th>
                    <th>Rango Inicio</th>
                    <th>Rango Final</th>
                </tr>
            </thead>
            <tbody id="resultsBody"></tbody>
        </table>
    </div>
    <script src="./static/js/main.js"></script>
</body>
</html>
